<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="static/assets1/fonts/icomoon/style.css">
    <link rel="stylesheet" href="static/assets1/css/owl.carousel.min.css">
    <link rel="stylesheet" href="static/assets1/css/bootstrap.min.css">

    <title>Sign Up</title>

    <!-- ✅ Improved CSS -->
    <style>
      body {
        font-family: 'Roboto', sans-serif;
        background: linear-gradient(135deg, #4e73df, #1cc88a);
        margin: 0;
      }

      .half {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .contents {
        background: #fff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        width: 100%;
        max-width: 700px;
      }

      h3 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
      }

      .form-group label {
        font-weight: 500;
        color: #555;
      }

      .form-control {
        height: 40px;
        border-radius: 8px;
        border: 1px solid #ccc;
        padding-left: 12px;
        margin-bottom: 10px;
        transition: 0.3s;
      }

      .form-control:focus {
        border-color: #4e73df;
        box-shadow: 0 0 5px rgba(78,115,223,0.4);
      }

      .btn-primary {
        background-color: #4e73df;
        border: none;
        height: 45px;
        border-radius: 8px;
        font-weight: 500;
      }

      .btn-primary:hover {
        background-color: #2e59d9;
      }

      .login-text {
        text-align: center;
        margin-top: 10px;
        font-size: 16px;
      }

      .login-text a {
        color: #4e73df;
        text-decoration: none;
      }

      .login-text a:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>

  <div class="d-lg-flex half">
    
    <!-- ❌ removed inline style -->
    <div class="contents order-2 order-md-1">

      <div class="container">
        <div class="row align-items-center justify-content-center">
          <div class="col-md-12">

            <h3>New Account</h3>
            
            <form action="/signup" method="GET">

              <!-- ✅ 2 fields per row -->
              <div class="row">

                <div class="col-md-6 form-group">
                  <label>Username</label>
                  <input type="text" class="form-control" name="user" placeholder="Username"
                    required pattern="[A-Za-z].{5,}">
                </div>

                <div class="col-md-6 form-group">
                  <label>Name</label>
                  <input type="text" class="form-control" name="name" placeholder="Name" required>
                </div>

                <div class="col-md-6 form-group">
                  <label>Email</label>
                  <input type="text" class="form-control" name="email" placeholder="Email"
                    required pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$">
                </div>

                <div class="col-md-6 form-group">
                  <label>Mobile Number</label>
                  <input type="text" class="form-control" name="mobile" placeholder="Mobile Number"
                    required pattern="[6-9]{1}[0-9]{9}">
                </div>

                <div class="col-md-6 form-group">
                  <label>Password</label>
                  <input type="password" class="form-control" name="password" placeholder="Password"
                    required pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}">
                </div>

              </div>

              <div style="text-align: center;">
  <input type="submit" value="Register" class="btn btn-primary px-4">
</div>

              <p class="login-text">
                Already have an account? <a href="/login">Sign in</a>
              </p>

            </form>

          </div>
        </div>
      </div>
    </div>
  </div>

    <script src="static/assets1/js/jquery-3.3.1.min.js"></script>
    <script src="static/assets1/js/popper.min.js"></script>
    <script src="static/assets1/js/bootstrap.min.js"></script>
  </body>
</html>
