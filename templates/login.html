<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="static/assets1/fonts/icomoon/style.css">
    <link rel="stylesheet" href="static/assets1/css/owl.carousel.min.css">
    <link rel="stylesheet" href="static/assets1/css/bootstrap.min.css">

    <title>Log In </title>

    <!-- ✅ Added Professional CSS -->
    <style>
      body {
        font-family: 'Roboto', sans-serif;
        background: linear-gradient(135deg, #4e73df, #1cc88a);
        height: 100vh;
        margin: 0;
      }

      .half {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .contents {
        background: #fff;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        width: 100%;
        max-width: 400px;
      }

      h3 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
      }

      .form-group label {
        font-weight: 500;
        color: #555;
      }

      .form-control {
        height: 45px;
        border-radius: 8px;
        border: 1px solid #ccc;
        padding-left: 12px;
        transition: 0.3s;
      }

      .form-control:focus {
        border-color: #4e73df;
        box-shadow: 0 0 5px rgba(78,115,223,0.4);
      }

      .btn-primary {
        background-color: #4e73df;
        border: none;
        height: 45px;
        border-radius: 8px;
        font-weight: 500;
        transition: 0.3s;
      }

      .btn-primary:hover {
        background-color: #2e59d9;
      }

      .register-text {
        text-align: center;
        font-size: 16px;
        margin-top: 10px;
      }

      .register-text a {
        color: #4e73df;
        font-weight: 500;
        text-decoration: none;
      }

      .register-text a:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>

    <div class="d-lg-flex half">
      <!-- ❌ removed inline margin styles -->
      <div class="contents order-2 order-md-1">

        <div class="container">
          <div class="row align-items-center justify-content-center">
            <div class="col-md-12">
              <h3>Log In</h3>

              <form action="/signin" method="GET">
                <div class="form-group first">
                  <label for="username">Username</label>
                  <input type="text" name="user" class="form-control" placeholder="Enter Username" id="username" required>
                </div>

                <div class="form-group last mb-3">
                  <label for="password">Password</label>
                  <input type="password" name="password" class="form-control" placeholder="Enter Password" id="password" required>
                </div>

                <input type="submit" value="Log In" class="btn btn-block btn-primary">

                <p class="register-text">
                  Register here! <a href="/register">Sign Up</a>
                </p>

              </form>
            </div>
          </div>
        </div>

      </div>
    </div>

    <script src="static/assets1/js/jquery-3.3.1.min.js"></script>
    <script src="static/assets1/js/popper.min.js"></script>
    <script src="static/assets1/js/bootstrap.min.js"></script>
    <script src="static/assets1/js/main.js"></script>

  </body>
</html>
